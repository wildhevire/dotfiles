# ENV.
env = XDG_CURRENT_DESKTOP,Hyprland 
env = XDG_SESSION_TYPE,wayland 
env = XDG_SESSION_DESKTOP,Hyprland 

env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct 
env = QT_STYLE_OVERRIDE,kvantum


exec-once = sh ~/.config/hypr/scripts/monitor.sh
source = ~/.config/hypr/monitor.conf
exec-once = sh ~/.config/hypr/scripts/workspace.sh
source = ~/.config/hypr/workspace.conf

source = ~/.config/hypr/env.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/startup.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrule.conf
# COLORS - Generated by pywal
source = ~/.cache/wal/hypr.conf
exec = sh ~/.config/hypr/scripts/profile.sh
exec-once = sh ~/.config/hypr/scripts/pywal.sh


general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 1
    border_size = 3
    col.active_border = $color13 $backgroundCol 90deg
    col.inactive_border = $backgroundCol

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}


decoration {
    rounding = 5
         

    drop_shadow=true
    shadow_range = 16
    shadow_render_power = 2
    shadow_offset = 2 2

    blurls = waybar
    layerrule = blur,waybar
    layerrule = blur,gtk-layer-shell


  blur {


      enabled = true	
      size = 2
      passes = 3
      ignore_opacity = true
      new_optimizations = true

  }
}




animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = windowBez, 0.51, 0.25, 0.82, 0.6
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 2, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    no_gaps_when_only = 1
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
    no_gaps_when_only = 0
}


misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

}

